name: Google Chat通知

on:
  schedule:
    - cron: '0 21 * * 0-4'  # 平日6:00 JST (前日21:00 UTC)
  workflow_dispatch:  # 手動実行も可能

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: 記事数を集計して通知
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          # 今日の日付(JST)
          TODAY=$(date -u -d '+9 hours' +%Y-%m-%d)

          # 今日の収集記事数（Raw/直下のmdファイル、index.md除く）
          RAW_COUNT=$(find Raw -maxdepth 1 -name "*.md" ! -name "index.md" -type f 2>/dev/null | wc -l)

          # Google Chatに送信（ai-blockchain形式、リンク1本）
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{
              \"text\": \"マーケキャッチアップ ${TODAY}\n今日は${RAW_COUNT}件まとめました。気になる方だけどうぞ。\n📖 https://ofgofj.github.io/sns_marketing_catchup/\"
            }" \
            "$WEBHOOK_URL"

          echo "通知送信完了 (${RAW_COUNT}件)"
